        .user-pulse { width: 24px; height: 24px; background-color: #235937; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(35, 89, 55, 0.6); animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(35, 89, 55, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(35, 89, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(35, 89, 55, 0); } }
        .custom-pin { width: 36px; height: 36px; background-color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .custom-pin:hover { transform: scale(1.1); }
        .pin-icon { width: 20px; height: 20px; }
        .validated-pin { border: 3px solid #10b981; color: #10b981; }
        .standard-pin { border: 3px solid #235937; color: #235937; }
        .not-working-pin { border: 3px solid #ef4444; color: #ef4444; opacity: 0.85; background-color: #fef2f2; }
        #bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; height: 70vh; background-color: #f8fafc; z-index: 500; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .sheet-handle { height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: none; }
        .handle-bar { width: 48px; height: 6px; background-color: #cbd5e1; border-radius: 999px; }
        .custom-scroll { overflow-y: auto; flex: 1; padding-bottom: 2rem; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .station-card { transition: background-color 0.2s; }
        .station-card:active { background-color: #f1f5f9; }
        @media (max-width: 1023px) { body:not(.sheet-collapsed) .leaflet-control-zoom { display: none !important; } }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #235937; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
        @media (min-width: 1024px) { #bottom-sheet { top: 0; bottom: 0; right: 0; left: auto; width: 420px; height: 100vh; border-radius: 0; box-shadow: -5px 0 25px rgba(0,0,0,0.1); transform: none !important; } .sheet-handle { display: none; } .leaflet-control-zoom { display: block !important; } }
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; margin-top: 20px !important;}
        .leaflet-control-zoom a { color: #235937 !important; }
        .leaflet-top.leaflet-left { top: 80px; }

    </button>

                            </svg>

            if (!text) return "";
            let limpo = String(text).replace(/(.*? - (?:PR|SC|SP|RS|RJ|MG|MS|MT|GO))-?.*/i, '$1');
            limpo = limpo.replace(/-?\d{2}[.,]\d{4,}.*/g, '');
            return limpo.replace(/[-\s,]+$/, '').trim();
        }

        function converterListaSuja(texto) {
            let postos = [];
            if (!texto.trim()) return postos;
            const linhas = texto.trim().split('\n');
            linhas.forEach(linha => {
                const col = linha.split('\t').map(c => c.trim());
                if (col.length >= 3) {
                    const fantasia = col[0] || "Posto";
                    const endereco = col[1] || "";
                    const idFixo = btoa(unescape(encodeURIComponent(fantasia + endereco))).substring(0, 15);
                    postos.push({
                        id: idFixo, fantasia, endereco,
                        cidade: limparTextoVisual(col.length > 3 ? col[2] : ""),
                        lat: parseFloat(col[col.length - 2].replace(',', '.')),
                        lng: parseFloat(col[col.length - 1].replace(',', '.')),
                        status: 'default', distance: 0
                    });
                }
            });
            return postos;
        }

        const rawData = converterListaSuja(listaSuja);

        // --- INTEGRAÇÃO SUPABASE ---
        async function setStatusGlobal(newStatus) {
            if (activeStationId) {
                const { error } = await supabaseClient
                    .from('status_postos')
                    .upsert({ id_posto: activeStationId, status: newStatus, updated_at: new Date().toISOString() });
                if (!error) {
                    const raw = rawData.find(s => s.id === activeStationId);
                    if (raw) raw.status = newStatus;
                    renderAll(false);
                }
            }
            closeActionMenu();
        }

        async function baixarStatusDoBanco() {
            const { data } = await supabaseClient.from('status_postos').select('*');
            if (data) {
                data.forEach(item => {
                    const posto = rawData.find(p => p.id === item.id_posto);
                    if (posto) posto.status = item.status;
                });
                processStations();
            }
        }

        // --- LÓGICA DE MAPA E UI ---
        const gasIconSVG = `<svg class="pin-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>`;
        const checkIconSVG = `<svg class="pin-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>`;
        const crossIconSVG = `<svg class="pin-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>`;
        const dotsIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>`;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-25.4297, -49.2719], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            L.control.zoom({ position: 'topleft' }).addTo(map);
        }

        function getUserLocation() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                    processStations();
                }, () => alert("Ative o GPS."));
            }
        }

        function processStations() {
            stationsWithCoords = rawData.map(s => ({
                ...s, distance: userLocation ? calculateDistance(userLocation.lat, userLocation.lng, s.lat, s.lng) : 0
            }));
            renderAll(true);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function renderAll(shouldFitBounds = false) {
            const searchTerm = document.getElementById('city-search').value.toLowerCase();
            let filtered = stationsWithCoords.filter(s => {
                let matchText = s.endereco.toLowerCase().includes(searchTerm) || s.fantasia.toLowerCase().includes(searchTerm) || s.cidade.toLowerCase().includes(searchTerm);
                let matchFilter = activeFilters.has('all') || activeFilters.has(s.status);
                let matchDist = s.distance === 0 || s.distance <= maxDistance;
                return matchText && matchFilter && matchDist;
            });

            filtered.sort((a, b) => {
                const weight = { 'working': 1, 'default': 2, 'not_working': 3 };
                return (weight[a.status] - weight[b.status]) || (a.distance - b.distance);
            });

            const topShow = filtered.slice(0, 50);
            renderList(topShow);
            renderMarkers(topShow, shouldFitBounds);
            document.getElementById('counter').innerText = `${filtered.length} postos`;
        }

        function renderList(list) {
            const container = document.getElementById('station-list');
            container.innerHTML = list.length === 0 ? '<div class="bg-white p-8 rounded-2xl text-center">Nenhum posto encontrado.</div>' : '';
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "station-card bg-white p-4 rounded-[1.25rem] shadow-sm border border-slate-100 flex flex-col relative";
                let badge = item.status === 'working' ? `<span class="bg-emerald-500 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-md uppercase">Funciona</span>` : 
                            (item.status === 'not_working' ? `<span class="bg-red-500 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-md uppercase">Não Funciona</span>` : 
                            `<span class="bg-slate-100 text-slate-500 text-[9px] font-extrabold px-2 py-0.5 rounded-md uppercase">Credenciado</span>`);
                
                card.innerHTML = `
                    <div class="absolute top-2.5 right-2 z-10"><button onclick="openActionMenu(event, '${item.id}')" class="text-slate-300 hover:text-[#235937] p-2">${dotsIconSVG}</button></div>
                    <div class="flex gap-3 items-center pr-10 cursor-pointer" onclick="map.flyTo([${item.lat}, ${item.lng}], 16); if(window.innerWidth<1024) toggleSheetJS(false);">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-100">${gasIconSVG}</div>
                        <div class="flex-1 min-w-0"><h3 class="font-bold text-slate-800 text-[15px] truncate">${item.fantasia}</h3><p class="text-[12px] text-slate-500 truncate">${item.endereco}</p></div>
                    </div>
                    <div class="mt-3 flex items-center justify-between border-t border-slate-50 pt-3">
                        <div class="flex items-center gap-2">${badge}<span class="text-[11px] text-slate-400 uppercase truncate max-w-[100px]">${item.cidade}</span></div>
                        <span class="text-[#235937] font-bold text-[13px] bg-[#235937]/10 px-2.5 py-1 rounded-lg">${item.distance > 0 ? (item.distance < 1 ? (item.distance*1000).toFixed(0)+'m' : item.distance.toFixed(1)+'km') : ''}</span>
                    </div>`;
                container.appendChild(card);
            });
        }

        function renderMarkers(list, shouldFitBounds) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            if (userLocation) {
                const uM = L.marker([userLocation.lat, userLocation.lng], { icon: L.divIcon({ html: '<div class="user-pulse"></div>', className: '', iconSize: [24, 24] }) }).addTo(map);
                markers.push(uM);
            }
            list.forEach(item => {
                let config = item.status === 'working' ? {class: 'validated-pin', svg: checkIconSVG} : (item.status === 'not_working' ? {class: 'not-working-pin', svg: crossIconSVG} : {class: 'standard-pin', svg: gasIconSVG});
                const m = L.marker([item.lat, item.lng], { icon: L.divIcon({ html: `<div class="custom-pin ${config.class}">${config.svg}</div>`, className: '', iconSize: [36, 36], iconAnchor: [18, 18] }) }).addTo(map);
                m.bindPopup(`<strong class="text-[#235937]">${item.fantasia}</strong><br><span class="text-xs text-slate-500">${item.endereco}</span>`);
                markers.push(m);
            });
            if (shouldFitBounds && markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1), { paddingBottomRight: window.innerWidth < 1024 ? [0, window.innerHeight * 0.4] : [420, 0] });
            }
        }

        // --- GESTOS E UI COMPLEMENTAR ---
        let startY = 0, currentY = 0, isDragging = false;
        dragHeader.addEventListener('touchstart', (e) => { if(window.innerWidth >= 1024 || e.target.closest('button')) return; startY = e.touches[0].clientY; isDragging = true; sheet.style.transition = 'none'; });
        dragHeader.addEventListener('touchmove', (e) => { if(!isDragging) return; currentY = e.touches[0].clientY; let diff = currentY - startY; if(isSheetOpen && diff > 0) sheet.style.transform = `translateY(${diff}px)`; });
        dragHeader.addEventListener('touchend', (e) => { if(!isDragging) return; isDragging = false; sheet.style.transition = ''; let diff = currentY - startY; if(diff > 100) toggleSheetJS(false); else toggleSheetJS(true); });

        function toggleSheetJS(open) { isSheetOpen = open; sheet.style.transform = open ? 'translateY(0)' : `translateY(calc(100% - 40px))`; document.body.classList.toggle('sheet-collapsed', !open); }
        function handleSearch(v) { document.getElementById('suggestions-box').classList.toggle('hidden', v.length < 2); renderAll(false); }
        function toggleFilter(t) { if(t==='all'){ activeFilters.clear(); activeFilters.add('all'); } else { activeFilters.delete('all'); activeFilters.has(t) ? activeFilters.delete(t) : activeFilters.add(t); if(!activeFilters.size) activeFilters.add('all'); } renderAll(false); }
        function openConfig() { document.getElementById('config-modal').classList.replace('hidden', 'flex'); }
        function closeConfig() { document.getElementById('config-modal').classList.replace('flex', 'hidden'); }
        function updateDistLabel(v) { document.getElementById('dist-label').innerText = v == 200 ? 'Sem Limite' : v; document.getElementById('dist-suffix').style.display = v == 200 ? 'none' : 'inline'; }
        function saveConfig() { let v = document.getElementById('dist-slider').value; maxDistance = v == 200 ? Infinity : parseInt(v); closeConfig(); renderAll(true); }
        function openActionMenu(e, id) { e.stopPropagation(); activeStationId = id; const menu = document.getElementById('action-menu'); menu.classList.remove('hidden'); menu.style.top = e.clientY + 'px'; menu.style.left = (e.clientX - 200) + 'px'; setTimeout(() => menu.classList.remove('opacity-0', 'scale-95'), 10); document.getElementById('action-menu-backdrop').classList.remove('hidden'); }
        function closeActionMenu() { const menu = document.getElementById('action-menu'); menu.classList.add('opacity-0', 'scale-95'); setTimeout(() => menu.classList.add('hidden'), 200); document.getElementById('action-menu-backdrop').classList.add('hidden'); }

        window.onload = async () => { initMap(); processStations(); await baixarStatusDoBanco(); };
    </script>
</body>
</html>
